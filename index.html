<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Institutional Perpetual Dashboard v21.0 - Multi-Target</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0c0d14; color: #cbd5e1; margin: 0; padding: 12px; }
        .container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
        .panel { background-color: #131722; padding: 16px; border-radius: 8px; border: 1px solid #2a2e39; }
        .setup-dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        .metric-card { background-color: #131722; border: 1px solid #2a2e39; border-radius: 8px; padding: 16px; position: relative; overflow: hidden; }
        .metric-title { font-size: 0.7rem; color: #787b86; font-weight: bold; text-transform: uppercase; }
        .metric-value { font-size: 1.2rem; font-weight: bold; color: #fff; margin-top: 4px; }
        
        /* TP Styles */
        .tp-card { background-color: #0f1c18; border-color: #059669; }
        .tp-text { color: #10b981; font-weight: bold; }
        
        .status-badge { font-size: 0.85rem; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; font-weight: bold; }
        .badge-waiting { color: #fbbf24; border: 1px solid #fbbf24; }
        .badge-progress { color: #3b82f6; border: 1px solid #3b82f6; }
        .badge-tphit { color: #10b981; border: 1px solid #10b981; }

        button { background: linear-gradient(135deg, #b38f4d, #d4af37); border: none; color: #000; font-weight: bold; cursor: pointer; padding: 14px; width: 100%; border-radius: 6px; text-transform: uppercase; }
        .terminal-header { border-bottom: 1px solid #2a2e39; padding-bottom: 8px; margin-bottom: 10px; font-size: 0.8rem; color: #d4af37; }
        .output-text { font-family: 'Courier New', monospace; font-size: 0.8rem; color: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <label>Mode / Aset</label>
        <select id="modeSistem" style="margin-bottom:10px;"><option value="SNIPER_VOL">🎯 SNIPER EXPERT + MULTI-TP</option></select>
        <input type="text" id="cryptoSearchInput" value="XAUUSD" style="width:100%; padding:12px; margin-bottom:10px; background:#1e222d; border:1px solid #2a2e39; color:#fff;">
        <button id="btnCalculate">🔮 SYNC QUANTUM PIPELINE</button>
    </div>

    <div class="setup-dashboard-grid" id="mainGrid">
        <div class="metric-card">
            <div class="metric-title">📡 LIVE STATE</div>
            <div id="executionBadge" class="status-badge badge-waiting">SETUP WAITING</div>
        </div>
        <!-- TP CARDS -->
        <div class="metric-card tp-card">
            <div class="metric-title">TARGET PROFIT 1 (Scalp)</div>
            <div class="metric-value tp-text" id="tp1">$-</div>
        </div>
        <div class="metric-card tp-card">
            <div class="metric-title">TARGET PROFIT 2 (Momentum)</div>
            <div class="metric-value tp-text" id="tp2">$-</div>
        </div>
        <div class="metric-card tp-card">
            <div class="metric-title">TARGET PROFIT 3 (Institutional)</div>
            <div class="metric-value tp-text" id="tp3">$-</div>
        </div>
    </div>

    <div class="panel">
        <div class="terminal-header">🏛️ MULTI-TARGET MONITOR SYSTEM v21.0</div>
        <div class="output-text" id="terminalOutput">Menunggu data...</div>
    </div>
</div>

<script>
    function calculatePipeline() {
        const basePrice = 4071.26; 
        const step = basePrice * 0.002;
        
        // Multi-TP Calculation
        const entry = basePrice - (step * 0.5);
        const tp1 = entry + (step * 1.5);
        const tp2 = entry + (step * 2.5);
        const tp3 = entry + (step * 4.0);
        const sl = entry - (step * 1.0);

        document.getElementById('tp1').innerText = `$${tp1.toFixed(3)}`;
        document.getElementById('tp2').innerText = `$${tp2.toFixed(3)}`;
        document.getElementById('tp3').innerText = `$${tp3.toFixed(3)}`;

        // Simulasi status
        document.getElementById('executionBadge').innerText = "SETUP ON PROGRESS";
        document.getElementById('executionBadge').className = "status-badge badge-progress";

        document.getElementById('terminalOutput').innerText = 
            `Entry Point : $${entry.toFixed(3)}\n` +
            `SL          : $${sl.toFixed(3)}\n` +
            `TP1 (1:1.5) : $${tp1.toFixed(3)}\n` +
            `TP2 (1:2.5) : $${tp2.toFixed(3)}\n` +
            `TP3 (1:4.0) : $${tp3.toFixed(3)}\n` +
            `Status      : Posisi aktif, memantau level likuiditas...`;
    }

    document.getElementById('btnCalculate').addEventListener('click', calculatePipeline);
</script>
</body>
</html>
